version: '3.8'

services:
  xcstring-java:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - xcstring_data:/data
    environment:
      # Database Configuration
      - DB_DRIVER=sqlite
      - DB_SQLITE_PATH=/data/database.sqlite

      # Application Settings
      - APP_NAME=XCString Editor (Java Local)
      - APP_DEBUG=false

      # User Registration
      - REGISTRATION_ENABLED=true

      # Session Configuration
      - SESSION_LIFETIME=604800
      - SESSION_COOKIE_SECURE=false

      # File Storage
      - FILES_MAX_FILE_SIZE=10485760
      - FILES_MAX_FILES_PER_USER=100

      # AI Configuration (uncomment and configure as needed)
      # - AI_ENABLED=true
      # - AI_DEFAULT_PROVIDER=openai
      # - OPENAI_ENABLED=true
      # - OPENAI_API_KEY=your-openai-api-key

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/backend/index.php/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  xcstring_data:
    driver: local
