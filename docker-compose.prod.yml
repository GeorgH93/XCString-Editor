version: '3.8'

services:
  xcstring-java:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      - DB_DRIVER=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=xcstring_editor
      - DB_USERNAME=xcstring
      - DB_PASSWORD=${DB_PASSWORD:-changeme}

      # Application Settings
      - APP_NAME=XCString Editor (Java Production)
      - APP_DEBUG=false
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}

      # User Registration
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}

      # Session Configuration
      - SESSION_LIFETIME=604800
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}

      # File Storage
      - FILES_MAX_FILE_SIZE=10485760
      - FILES_MAX_FILES_PER_USER=100

      # OAuth2 Configuration (uncomment and configure as needed)
      # - OAUTH2_ENABLED=true
      # - OAUTH2_BASE_URL=https://your-domain.com
      # - OAUTH2_GOOGLE_ENABLED=true
      # - OAUTH2_GOOGLE_CLIENT_ID=your-google-client-id
      # - OAUTH2_GOOGLE_CLIENT_SECRET=your-google-client-secret

      # AI Configuration (uncomment and configure as needed)
      # - AI_ENABLED=true
      # - AI_DEFAULT_PROVIDER=openai
      # - OPENAI_ENABLED=true
      # - OPENAI_API_KEY=${OPENAI_API_KEY}

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=xcstring_editor
      - MYSQL_USER=xcstring
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
